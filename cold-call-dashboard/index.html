<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Холодные обзвоны</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://api.bitrix24.com/api/v1/" defer></script>
</head>
<body>
    <div class="dashboard">
        <header class="dashboard-header">
            <h1>Холодные обзвоны</h1>
            <button id="refresh-btn" class="btn-refresh">↻ Обновить</button>
        </header>
        
        <div class="dashboard-grid">
            <section class="card card-urgent">
                <h2>Срочно позвонить</h2>
                <div id="urgent-list" class="client-list">
                    <div class="loading">Загрузка...</div>
                </div>
            </section>
            
            <section class="card card-today">
                <h2>Звонки за сегодня</h2>
                <div id="today-stats" class="stats">
                    <div class="loading">Загрузка...</div>
                </div>
            </section>
            
            <section class="card card-conversion">
                <h2>Конверсия</h2>
                <div id="conversion-stats" class="stats">
                    <div class="loading">Загрузка...</div>
                </div>
            </section>
        </div>
    </div>
    
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
